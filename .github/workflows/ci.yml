name: ci

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # One compile path: fmt, clippy, test, doc, and supply-chain checks share rust-cache.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust
      - run: cargo metadata --locked --format-version 1 > /dev/null
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace
      - run: RUSTDOCFLAGS='-D warnings' cargo doc --locked --no-deps
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22.1
      - run: cargo deny --locked --all-features check
      - run: cargo audit

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --locked --workspace --all-features --tests --summary-only --fail-under-lines 70 --ignore-filename-regex '/src/main\.rs$|/src/cli\.rs$|/hardware/yubikey\.rs$'
