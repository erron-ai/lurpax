name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  # Tag push: use ref_name. workflow_dispatch: use tag input only (do not fall back to branch ref_name).
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}

jobs:
  assert-release-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          if [ -z "${TAG}" ]; then
            echo "::error::Release tag is empty. For workflow dispatch, set the tag input (e.g. v0.7.0)."
            exit 1
          fi
          if [[ ! "${TAG}" =~ ^v[0-9] ]]; then
            echo "::error::Invalid release tag '${TAG}' (expected a version tag like v0.7.0, not a branch name)."
            exit 1
          fi

  build:
    needs: assert-release-tag
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl') && startsWith(matrix.target, 'x86_64')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --version 0.2.5 --locked

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          tag="${TAG}"
          name="lurpax-${tag}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/lurpax" "$name/"
          cp README.md LICENSE* SECURITY.md "$name/" 2>/dev/null || true
          tar czf "${name}.tar.gz" "$name"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lurpax-${{ matrix.target }}
          path: |
            lurpax-*.tar.gz
            lurpax-*.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums file
        shell: bash
        run: cat ./*.sha256 > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            lurpax-*.tar.gz
            lurpax-*.tar.gz.sha256
            checksums-sha256.txt

  crates-io:
    needs: build
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "Skipping crates.io: CARGO_REGISTRY_TOKEN secret is not set."
            exit 0
          fi
          cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"

  update-homebrew-tap:
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          g="${{ secrets.GH_TOKEN }}"
          t="${{ secrets.HOMEBREW_TAP_TOKEN }}"
          export TAP_PUSH_TOKEN="${g:-${t:-}}"
          if [ -z "${TAP_PUSH_TOKEN}" ]; then
            echo "::notice::Add repository secret GH_TOKEN or HOMEBREW_TAP_TOKEN to automate the Homebrew tap."
            exit 0
          fi
          bash scripts/push_homebrew_tap.sh "${RELEASE_TAG}"
