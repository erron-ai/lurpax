# Pushes tags with the default GITHUB_TOKEN do not trigger other workflows (including
# release on tag push). Use repository secret GH_TOKEN: a PAT with contents:write on
# this repo so `git push` runs as a user and the release workflow fires.
# Classic PAT: repo scope. Fine-grained: Contents Read and write.
name: tag-release-on-main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Require GH_TOKEN (PAT tag pushes trigger release workflow)
        env:
          PAT: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::Set repository secret GH_TOKEN to a PAT with contents:write. The default GITHUB_TOKEN cannot trigger the release workflow on tag push."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Push v{version} if missing
        run: |
          set -euo pipefail
          version="$(python3 -c "
          import tomllib
          with open('Cargo.toml', 'rb') as f:
              print(tomllib.load(f)['package']['version'])
          ")"
          tag="v${version}"
          if git ls-remote --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin, skipping."
            exit 0
          fi
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${tag}"
          echo "Pushed ${tag} at ${GITHUB_SHA}"
