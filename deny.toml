[advisories]
version = 2
ignore = [
    # `instant` is unmaintained but pulled in transitively by reed-solomon-erasure
    # via parking_lot 0.11. No newer version of reed-solomon-erasure available.
    # Only used for lock timing, not security-critical.
    "RUSTSEC-2024-0384",
]

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "Unicode-3.0", "Zlib", "ISC", "BSL-1.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
